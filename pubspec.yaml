name: courtly
description: 'A courtside social companion for private match circles, guest notes, and polished meetups.'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  webview_flutter: ^4.14.0
  image_picker: ^1.2.2
  sign_in_with_apple: ^8.1.0

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
