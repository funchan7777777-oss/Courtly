name: courtly
description: 'A courtside social companion for private match circles, guest notes, and polished meetups.'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  webview_flutter: ^4.14.0
  image_picker: ^1.2.2
  sign_in_with_apple: ^8.1.0
  video_player: ^2.11.1
  camera: ^0.12.0+1
  permission_handler: ^12.0.3
  in_app_purchase: ^3.3.0

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/head/men/
    - assets/images/head/women/
    - assets/images/post/
    - assets/videos/
  fonts:
    - family: CourtlyInter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
    - family: CourtlyPlayfair
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Variable.ttf
        - asset: assets/fonts/PlayfairDisplay-Italic-Variable.ttf
          style: italic
    - family: CourtlyOswald
      fonts:
        - asset: assets/fonts/Oswald-Variable.ttf
